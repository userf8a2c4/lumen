name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (renderer)
        run: npm run build

      - name: Build Electron (installer)
        run: npx electron-builder --win --publish never

      - name: Find .exe file
        id: find_exe
        shell: bash
        run: |
          EXE_FILE=$(find dist -maxdepth 1 -name "*.exe" -type f | head -1)
          if [ -n "$EXE_FILE" ]; then
            echo "exe_path=$EXE_FILE" >> $GITHUB_OUTPUT
            echo "Found: $EXE_FILE"
          else
            echo "No .exe found in dist/"
            ls -R dist/
            exit 1
          fi

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
