name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (renderer)
        run: npm run build

      - name: Build Electron (installer)
        run: npx electron-builder --win --publish never

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          # Find and upload all .exe files
          $exeFiles = Get-ChildItem -Path . -Include "*.exe" -Recurse -ErrorAction SilentlyContinue
          foreach ($file in $exeFiles) {
            Write-Output "Found: $($file.FullName)"
            & gh release upload ${{ github.ref_name }} $file.FullName --clobber
          }
