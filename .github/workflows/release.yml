name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create config files
        shell: pwsh
        run: |
          Write-Host "Creating configuration files..."

          # Google Calendar config
          $cal = "module.exports = { GOOGLE_CLIENT_ID: '${{ secrets.GOOGLE_CLIENT_ID }}', GOOGLE_CLIENT_SECRET: '${{ secrets.GOOGLE_CLIENT_SECRET }}' };"
          Set-Content -Path src/main/gcal-config.js -Value $cal -Encoding UTF8
          Write-Host "✓ Google Calendar config created"

          # Gemini API key
          $gem = "module.exports = { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' };"
          Set-Content -Path src/main/gemini-config.js -Value $gem -Encoding UTF8
          Write-Host "✓ Gemini API config created"

      - name: Build Vite renderer
        run: npm run build

      - name: Build Windows installer
        shell: pwsh
        run: |
          Write-Host "Starting electron-builder..."
          npx electron-builder --win --publish always

      - name: Check for exe files
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "release" -Filter "*.exe" -Recurse
          if ($exeFiles.Count -eq 0) {
            Write-Host "ERROR: No .exe files found in release folder!" -ForegroundColor Red
            Write-Host "Release folder contents:" -ForegroundColor Yellow
            Get-ChildItem -Path "release" -Recurse
            exit 1
          }
          Write-Host "Found $($exeFiles.Count) .exe file(s):" -ForegroundColor Green
          foreach ($file in $exeFiles) {
            Write-Host "  ✓ $($file.Name) ($([math]::Round($file.Length/1MB, 2)) MB)" -ForegroundColor Green
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: release/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
