name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release (e.g. v0.1.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create config files
        shell: pwsh
        run: |
          Write-Host "Creating configuration files..."

          $cal = "module.exports = { GOOGLE_CLIENT_ID: '${{ secrets.GOOGLE_CLIENT_ID }}', GOOGLE_CLIENT_SECRET: '${{ secrets.GOOGLE_CLIENT_SECRET }}' };"
          Set-Content -Path src/main/gcal-config.js -Value $cal -Encoding UTF8
          Write-Host "OK Google Calendar config"

          $gem = "module.exports = { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' };"
          Set-Content -Path src/main/gemini-config.js -Value $gem -Encoding UTF8
          Write-Host "OK Gemini API config"

      - name: Resolve release tag
        id: get_tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
          } elseif ('${{ github.ref_type }}' -eq 'tag') {
            $tag = '${{ github.ref_name }}'
          } else {
            $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
            $tag = "v$version"
            $exists = git tag -l $tag
            if (-not $exists) {
              git config user.email "actions@github.com"
              git config user.name "GitHub Actions"
              git tag $tag
              git push origin $tag
              Write-Host "Created and pushed tag $tag"
            } else {
              Write-Host "Tag $tag already exists, skipping creation"
            }
          }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"

      - name: Build Vite renderer
        run: npm run build

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Starting electron-builder..."
          npx electron-builder --win --publish never
          Write-Host "Build complete"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          name: LUMEN ${{ steps.get_tag.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
