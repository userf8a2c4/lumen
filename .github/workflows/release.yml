name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets (Google OAuth + Gemini API key)
        shell: pwsh
        run: |
          Write-Host "Preparing configuration files..."

          # Google Calendar config (use secrets if available, fallback to empty)
          $GCID = "${{ secrets.GOOGLE_CLIENT_ID }}"
          $GCSE = "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          if ($GCID -and $GCSE) {
            $cal = "module.exports = { GOOGLE_CLIENT_ID: '$GCID', GOOGLE_CLIENT_SECRET: '$GCSE' };"
          } else {
            $cal = "module.exports = { GOOGLE_CLIENT_ID: '', GOOGLE_CLIENT_SECRET: '' };"
          }
          Set-Content -Path src/main/gcal-config.js -Value $cal -Encoding UTF8

          # Gemini API key (use secret if available, fallback to empty)
          $GAIK = "${{ secrets.GEMINI_API_KEY }}"
          if ($GAIK) {
            $gem = "module.exports = { GEMINI_API_KEY: '$GAIK' };"
          } else {
            $gem = "module.exports = { GEMINI_API_KEY: '' };"
          }
          Set-Content -Path src/main/gemini-config.js -Value $gem -Encoding UTF8

          Write-Host "Configuration files created"

      - name: Build Vite (renderer)
        run: npm run build

      - name: Build with electron-builder
        shell: pwsh
        run: |
          Write-Host "Starting electron-builder for Windows..."
          npx electron-builder --win --publish always

      - name: Upload release artifacts
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
