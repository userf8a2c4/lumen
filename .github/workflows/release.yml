name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create config files
        shell: pwsh
        run: |
          Write-Host "Creating configuration files..."

          # Google Calendar config
          $cal = "module.exports = { GOOGLE_CLIENT_ID: '${{ secrets.GOOGLE_CLIENT_ID }}', GOOGLE_CLIENT_SECRET: '${{ secrets.GOOGLE_CLIENT_SECRET }}' };"
          Set-Content -Path src/main/gcal-config.js -Value $cal -Encoding UTF8
          Write-Host "✓ Google Calendar config created"

          # Gemini API key
          $gem = "module.exports = { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' };"
          Set-Content -Path src/main/gemini-config.js -Value $gem -Encoding UTF8
          Write-Host "✓ Gemini API config created"

      - name: Build Vite renderer
        run: npm run build

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Starting electron-builder..."
          npx electron-builder --win --publish never
          Write-Host "Build complete"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: false
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
