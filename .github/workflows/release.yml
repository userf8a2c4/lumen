name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Google OAuth credentials
        env:
          GCID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GCSE: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        shell: pwsh
        run: |
          $content = "module.exports = { GOOGLE_CLIENT_ID: '$env:GCID', GOOGLE_CLIENT_SECRET: '$env:GCSE' };"
          Set-Content -Path src/main/gcal-config.js -Value $content -Encoding UTF8

      - name: Build Vite (renderer)
        run: npm run build

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
