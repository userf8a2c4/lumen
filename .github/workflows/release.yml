name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (renderer)
        run: npm run build

      - name: Build Electron (installer)
        run: npx electron-builder --win --publish never

      - name: Find .exe file
        id: find_exe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path "dist" -Name "*.exe" -Include "*Setup*" | Select-Object -First 1
          if ($exe) {
            echo "exe_file=$exe" >> $env:GITHUB_OUTPUT
            echo "exe_path=dist/$exe" >> $env:GITHUB_OUTPUT
            echo "✓ Found: $exe"
          } else {
            echo "❌ No .exe found in dist"
            Get-ChildItem -Path "dist" -Recurse | Select-Object Name
            exit 1
          }

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
