name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to release (e.g. v0.5.21)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create config files
        shell: pwsh
        run: |
          $cal = "module.exports = { GOOGLE_CLIENT_ID: '${{ secrets.GOOGLE_CLIENT_ID }}', GOOGLE_CLIENT_SECRET: '${{ secrets.GOOGLE_CLIENT_SECRET }}' };"
          Set-Content -Path src/main/gcal-config.js -Value $cal -Encoding UTF8

          $gem = "module.exports = { GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}' };"
          Set-Content -Path src/main/gemini-config.js -Value $gem -Encoding UTF8

      - name: Build renderer
        run: npm run build

      - name: Build installer
        shell: pwsh
        run: npx electron-builder --win --publish never

      - name: Get version tag
        id: get_tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            echo "TAG=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = '${{ github.ref_name }}'
            echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          name: LUMEN ${{ steps.get_tag.outputs.TAG }}
          draft: false
          prerelease: false
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
